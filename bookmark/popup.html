<!doctype html>
<html style="width: 408px; min-width: 408px; max-width: 408px; height: 520px; min-height: 520px; max-height: 520px;">
  <head>
    <meta charset="UTF-8" />
    <title>Maple Bookmarks</title>
    <script src="height-init.js"></script>
    <style>
      html {
        width: 408px;
        min-width: 408px;
        max-width: 408px;
        height: 520px;
        min-height: 520px;
        max-height: 520px;
      }

      body {
        margin: 0;
        padding: 12px 0 14px 14px;
        width: 408px;
        min-width: 408px;
        max-width: 408px;
        height: 520px;
        min-height: 520px;
        max-height: 520px;
        box-sizing: border-box;
        overflow-x: hidden;
        overflow-y: auto;
        background-color: #FAF8F5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      body::-webkit-scrollbar {
        display: none;
      }

      /* ── Settings ── */
      .settings-wrapper {
        position: fixed;
        top: 8px;
        right: 8px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }

      .settings-btn {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 8px;
        background-color: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #8B7B6B;
        transition: color 0.2s ease, background-color 0.2s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        opacity: 1;
        pointer-events: auto;
        padding: 0;
      }

      .settings-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      .settings-btn:hover {
        background-color: rgba(166, 124, 82, 0.08);
        color: #8B7355;
        transform: rotate(30deg);
      }

      .settings-btn:active {
        transform: rotate(60deg) scale(0.92);
        transition-duration: 0.1s;
      }

      /* ── Hot area ── */
      #hot-area {
        position: absolute;
        top: 0;
        left: 20%;
        width: 70%;
        height: 40px;
        z-index: 100;
        cursor: pointer;
      }

      /* ── Notification ── */
      #notification-container {
        padding: 6px 12px;
        position: fixed;
        left: 0;
        top: 0;
        z-index: 99;
        max-width: 80%;
        background-color: rgba(60, 42, 28, 0.82);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
        font-size: 12px;
        line-height: 16px;
        font-weight: 500;
        font-family: inherit;
        color: #FAF8F5;
        transform: translatex(-105%);
        transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        border-radius: 0 10px 10px 0;
        word-break: break-all;
      }

      /* ── Folders ── */
      .folder {
        width: 100%;
      }

      h2 {
        padding-left: 1px;
        font-size: 10.5px;
        font-weight: 700;
        color: #B8A089;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        line-height: 1;
        margin-block-end: 8px;
        margin-block-start: 16px;
        user-select: none;
      }

      .folderTitle.collapsible-folder {
        position: relative;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 24px 4px 6px;
        border-radius: 6px;
        margin-left: -6px;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .folderTitle.collapsible-folder:hover {
        background-color: rgba(166, 124, 82, 0.06);
      }

      .folderTitle .folder-arrow {
        position: absolute;
        top: 50%;
        right: 16px;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 12px;
        height: 12px;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        flex-shrink: 0;
      }

      .folderTitle .folder-arrow::before {
        content: "";
        display: block;
        width: 5px;
        height: 5px;
        border: solid #C4B5A4;
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(-45deg);
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.2s ease;
      }

      .folderTitle.collapsible-folder:hover .folder-arrow::before {
        border-color: #8B7355;
      }

      .folderTitle.collapsible-folder.expanded .folder-arrow::before {
        transform: rotate(45deg);
      }

      .folderTitle .folder-label {
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ── Bookmarks grid ── */
      .childContainer {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-start;
        gap: 6px;
      }

      .childContainer > .bookmark {
        width: 120px;
        height: 38px;
        box-sizing: border-box;
        border-radius: 10px;
        background-color: #FFFFFF;
        border: 1px solid rgba(166, 124, 82, 0.06);
        box-shadow: 0 1px 2px rgba(120, 80, 40, 0.04);
        padding: 0 10px;
        text-align: center;
        display: flex;
        align-items: center;
        text-decoration: none;
        transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                    box-shadow 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                    border-color 0.2s ease;
        animation: bookmarkEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .childContainer > .bookmark:hover {
        border-color: rgba(166, 124, 82, 0.12);
        box-shadow: 0 3px 12px rgba(120, 80, 40, 0.08), 0 1px 3px rgba(120, 80, 40, 0.04);
        transform: translateY(-2px);
      }

      .childContainer > .bookmark:active {
        transform: scale(0.97) translateY(0);
        box-shadow: 0 1px 2px rgba(120, 80, 40, 0.04);
        transition-duration: 0.08s;
      }

      /* ── Staggered entrance for bookmark cards ── */
      @keyframes bookmarkEnter {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .childContainer > .bookmark:nth-child(1) { animation-delay: 0.02s; }
      .childContainer > .bookmark:nth-child(2) { animation-delay: 0.05s; }
      .childContainer > .bookmark:nth-child(3) { animation-delay: 0.08s; }
      .childContainer > .bookmark:nth-child(4) { animation-delay: 0.1s; }
      .childContainer > .bookmark:nth-child(5) { animation-delay: 0.12s; }
      .childContainer > .bookmark:nth-child(6) { animation-delay: 0.14s; }
      .childContainer > .bookmark:nth-child(7) { animation-delay: 0.16s; }
      .childContainer > .bookmark:nth-child(8) { animation-delay: 0.18s; }
      .childContainer > .bookmark:nth-child(9) { animation-delay: 0.2s; }

      /* ── Folder section entrance ── */
      .folder {
        animation: folderEnter 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .folder:nth-child(1) { animation-delay: 0s; }
      .folder:nth-child(2) { animation-delay: 0.06s; }
      .folder:nth-child(3) { animation-delay: 0.12s; }
      .folder:nth-child(4) { animation-delay: 0.15s; }
      .folder:nth-child(5) { animation-delay: 0.18s; }

      @keyframes folderEnter {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .bookmark p {
        font-size: 13px;
        font-weight: 500;
        color: #2C2418;
        margin-left: 8px;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
        line-height: 1;
      }

      .favicon {
        height: 16px;
        width: 16px;
        flex-shrink: 0;
        border-radius: 4px;
      }

      /* ── Search ── */
      #search-wrapper {
        margin-bottom: 22px;
        position: relative;
        margin-top: -30px;
        transform: translateY(-105%);
        transition: none;
      }

      body.popup-interactive #search-wrapper {
        transition: all 0.32s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #search-wrapper.show {
        transform: translateY(0) !important;
        margin-top: 0 !important;
        height: auto !important;
      }

      #search-wrapper.show .arrow {
        transform: rotate(-135deg);
        opacity: 1 !important;
      }

      .search-action {
        width: 380px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 108%;
        height: 20px;
        cursor: pointer;
      }

      #search-wrapper .arrow {
        position: relative;
        opacity: 0;
        content: "";
        border: solid #B8A089;
        border-width: 0 1.5px 1.5px 0;
        display: inline-block;
        padding: 4px;
        transform: rotate(45deg);
        transition: none;
        cursor: pointer;
      }

      body.popup-interactive #search-wrapper .arrow {
        transition: all 0.32s cubic-bezier(0.16, 1, 0.3, 1);
      }

      #search-wrapper .arrow::after {
        content: "";
        display: inline-block;
        position: absolute;
        top: -10px;
        bottom: -10px;
        left: -20px;
        right: -20px;
      }

      #header {
        margin-bottom: 24px;
        width: 380px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: transparent;
      }

      #searchInput {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 400;
        height: 18px;
        line-height: 20px;
        color: #2C2418;
        outline: none;
        caret-color: #B8A089;
        background: transparent;
        text-align: center;
        border: none;
        font-family: inherit;
      }

      #searchInput::placeholder {
        color: #C4B5A4;
      }

      #search-wrapper.show #searchInput {
        border-bottom: 1px solid rgba(166, 124, 82, 0.1);
      }

      #best-match .bookmark.active {
        background-color: rgba(166, 124, 82, 0.06);
        border-color: rgba(166, 124, 82, 0.12);
      }

      /* ── Bookmarks area ── */
      #bookmarks {
        min-height: 420px;
      }

      /* ── Empty state ── */
      p.message {
        color: #A8A29E;
        text-align: center;
        font-weight: 400;
        font-size: 14px;
        line-height: 1.8;
        animation: fadeIn 0.5s ease both;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* ── Loading skeleton ── */
      .loading-state {
        width: 100%;
        padding-right: 14px;
        box-sizing: border-box;
        animation: fadeIn 0.3s ease both;
      }

      body.popup-loading #search-wrapper,
      body.popup-loading #hot-area,
      body.popup-loading #notification-container,
      body.popup-loading .settings-wrapper {
        visibility: hidden;
      }

      .loading-title {
        width: 60px;
        height: 10px;
        border-radius: 5px;
        background: linear-gradient(90deg, #EDE8E1 25%, #E3DCD3 37%, #EDE8E1 63%);
        background-size: 400% 100%;
        margin: 16px 0 10px 1px;
        animation: mapleSkeleton 1.4s ease-in-out infinite;
      }

      .loading-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .loading-card {
        width: 120px;
        height: 38px;
        box-sizing: border-box;
        border-radius: 10px;
        background: linear-gradient(90deg, #EDE8E1 25%, #E3DCD3 37%, #EDE8E1 63%);
        background-size: 400% 100%;
        animation: mapleSkeleton 1.4s ease-in-out infinite;
      }

      .loading-card:nth-child(1) { animation-delay: 0s; }
      .loading-card:nth-child(2) { animation-delay: 0.06s; }
      .loading-card:nth-child(3) { animation-delay: 0.12s; }
      .loading-card:nth-child(4) { animation-delay: 0.15s; }
      .loading-card:nth-child(5) { animation-delay: 0.18s; }
      .loading-card:nth-child(6) { animation-delay: 0.2s; }
      .loading-card:nth-child(7) { animation-delay: 0.22s; }
      .loading-card:nth-child(8) { animation-delay: 0.24s; }
      .loading-card:nth-child(9) { animation-delay: 0.26s; }

      @keyframes mapleSkeleton {
        0% { background-position: 100% 50%; }
        100% { background-position: 0 50%; }
      }

      /* ── Dark mode ── */
      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(168deg, #2A2520 0%, #1A1816 38%, #141210 100%);
          background-attachment: fixed;
        }

        .settings-btn {
          color: #8A8078;
        }

        .settings-btn:hover {
          background-color: rgba(196, 149, 106, 0.1);
          color: #A8956E;
        }

        #notification-container {
          background-color: rgba(30, 26, 22, 0.88);
          -webkit-backdrop-filter: blur(20px);
          backdrop-filter: blur(20px);
          color: #EDE8E1;
        }

        h2,
        p.message,
        h2 .expandIcon {
          color: rgba(255, 255, 255, 0.88);
        }

        #search-wrapper .arrow {
          border-color: #3D3730;
        }

        .childContainer .bookmark {
          background-color: #242120;
          border-color: rgba(196, 149, 106, 0.06);
          box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .childContainer > .bookmark:hover {
          background-color: #2E2A27;
          border-color: rgba(196, 149, 106, 0.12);
          box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25), 0 1px 3px rgba(0, 0, 0, 0.15);
        }

        .childContainer > .bookmark:active {
          box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        #best-match .bookmark.active {
          background-color: rgba(196, 149, 106, 0.08);
          border-color: rgba(196, 149, 106, 0.12);
        }

        .bookmark p {
          color: #F0EBE4;
        }

        #searchInput {
          color: #DDD6CC;
          caret-color: rgba(196, 149, 106, 0.5);
        }

        #searchInput::placeholder {
          color: #3D3730;
        }

        #search-wrapper.show #searchInput {
          border-bottom: 1px solid rgba(196, 149, 106, 0.08);
        }

        .folderTitle .folder-arrow::before {
          border-color: #3D3730;
        }

        .folderTitle.collapsible-folder:hover {
          background-color: rgba(196, 149, 106, 0.06);
        }

        .folderTitle.collapsible-folder:hover .folder-arrow::before {
          border-color: #5C5549;
        }

        .loading-title {
          background: linear-gradient(90deg, #242120 25%, #2E2A27 37%, #242120 63%);
          background-size: 400% 100%;
        }

        .loading-card {
          background: linear-gradient(90deg, #242120 25%, #2E2A27 37%, #242120 63%);
          background-size: 400% 100%;
        }
      }
    </style>
  </head>
  <body
    class="popup-loading"
    style="width: 408px; min-width: 408px; max-width: 408px; height: 520px; min-height: 520px; max-height: 520px;"
  >
    <div class="settings-wrapper">
      <button class="settings-btn" id="settingsBtn" title="">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/>
        </svg>
      </button>
    </div>
    <div id="hot-area"></div>
    <div id="notification-container"></div>
    <div id="search-wrapper">
      <div id="header">
        <input id="searchInput" type="text" placeholder="Search..." />
      </div>
      <div id="best-match"></div>
      <div class="search-action">
        <i class="arrow"></i>
      </div>
    </div>
    <div id="bookmarks">
      <div class="loading-state" data-loading="true" aria-label="Loading bookmarks">
        <div class="loading-title"></div>
        <div class="loading-grid">
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
          <div class="loading-card"></div>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
